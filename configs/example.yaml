llm:
  model: "Qwen/Qwen3-4B-Instruct-2507"
  adapter_path: "outputs/qwen_hotpotqa_lora_final"
  use_4bit: false
  torch_dtype: "auto"
  device: "cuda"
  temperature: 0.0
  max_tokens: 256

embedding:
  model: "BAAI/bge-m3"
  device: "cuda"
  batch_size: 32
  max_length: 512

agent:
  max_loops: 10
  max_token_budget: 128000
  verbose: false

data:
  prepared_dir: "data/hotpotqa"
  chunks_file: "data/hotpotqa/corpus_chunks.json"
  validation_questions_file: "data/hotpotqa/val_questions.json"
  test_questions_file: "data/hotpotqa/test_questions.json"
  sft_train_file: "data/hotpotqa/sft_train.jsonl"
  sft_val_file: "data/hotpotqa/sft_val.jsonl"
  embed_sample_limit: 1000 # Limit the number of documents to embed for retrieval options 1000, All
  question_sample_limit: 50 # Limit the number of questions to use for evaluation and tuning options 50, All
  split_seed: 42
  reuse_prepared_data: false

retrieval:
  artifact_dir: "data/hotpotqa/index"
  reuse_existing: true
  top_k: 3

runtime:
  mode: "both" # options: "agentic", "baseline", "both"
  device: "cuda"
  save_predictions: true

tuning:
  modes: ["baseline", "agentic"] # options: "baseline", "agentic" ["baseline", "agentic"]
  top_k_values: [1, 3, 5]
  temperature_values: [0.0, 0.1, 0.3]
  max_new_tokens_values: [20, 50, 80]
  num_samples: 50

training:
  output_dir: "outputs/qwen_hotpotqa_lora"
  num_train_epochs: 1
  learning_rate: 2e-5
  per_device_train_batch_size: 2
  per_device_eval_batch_size: 2
  gradient_accumulation_steps: 4
  logging_steps: 100
  eval_steps: 1000
  save_steps: 1000
  save_total_limit: 2
  load_best_model_at_end: true

output:
  results_dir: "results"
  comparison_file: "results/comparison.csv"
